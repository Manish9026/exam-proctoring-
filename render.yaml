 services:
  # 1. Backend Web Service (Django)
  - type: web
    name: proctor-api
    plan: free
    env: python
    buildCommand: ./server/build.sh
    startCommand: gunicorn server.wsgi:application --chdir server --timeout 120 --workers 1 --worker-class sync
    envVars:
      - key: MPLCONFIGDIR
        value: "/tmp/matplotlib"
      - key: YOLO_CONFIG_DIR
        value: "/tmp/Ultralytics"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: MONGODB_URI
        sync: false # Provide your Atlas URI in Render dashboard
      - key: ALLOWED_HOSTS
        value: "proctor-api.onrender.com,localhost"
      - key: PYTHON_VERSION
        value: "3.10.14"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://proctor-app.onrender.com,https://proctor-app-cv7j.onrender.com"

  # 2. Frontend Static Site (Vite/React)
  - type: web
    name: proctor-app
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://proctor-api-llnc.onrender.com/api"
    headers:
      - path: /*
        name: Cache-Control
        value: max-age=31536000
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
