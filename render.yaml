services:
  # 1. Backend Web Service (Django)
  - type: web
    name: proctor-api
    env: python
    buildCommand: ./server/build.sh
    startCommand: gunicorn server.wsgi:application --chdir server
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: MONGODB_URI
        sync: false # Provide your Atlas URI in Render dashboard
      - key: ALLOWED_HOSTS
        value: "proctor-api.onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://proctor-app.onrender.com"

  # 2. Frontend Static Site (Vite/React)
  - type: web
    name: proctor-app
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://proctor-api.onrender.com"
    headers:
      - path: /*
        name: Cache-Control
        value: max-age=31536000
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
